<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&family=Nunito:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    font-family: 'Nunito', sans-serif;
    background: radial-gradient(120% 120% at 50% 0%, #3a2c20 0%, #271d15 55%, #1c140e 100%);
  }
  @keyframes bob { 0%,100% { transform: scaleY(0.35); } 50% { transform: scaleY(1); } }
  @keyframes floaty { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
</style>
</helmet>
<div style="display:flex; flex-direction:column; align-items:center; gap:18px; padding:40px;">

  <div style="position:relative; width:1000px; height:625px; border-radius:14px; overflow:hidden;
              box-shadow: 0 0 0 8px #4a3526, 0 0 0 11px #2e2017, 0 26px 60px rgba(0,0,0,0.55);">

    <canvas ref="{{ setSceneCanvas }}" width="160" height="100"
            style="position:absolute; inset:0; width:1000px; height:625px; image-rendering:pixelated; display:block;"></canvas>

    <!-- ===================== IN-ROOM OVERLAYS ===================== -->
    <div style="position:absolute; inset:0; display:{{ roomDisplay }};">

      <!-- name tags (positioned each frame by the loop) -->
      <div ref="{{ setTagSelf }}" style="position:absolute; left:0; top:0; opacity:0; transform:translateX(-50%); pointer-events:none; display:flex; align-items:center; gap:6px; background:#f7eedd; border:2px solid #4a3526; border-radius:7px; padding:2px 9px; font-family:'Pixelify Sans',sans-serif; font-size:15px; color:#4a3526; white-space:nowrap; box-shadow:0 2px 0 #4a3526;">
        <span style="width:9px; height:9px; border-radius:2px; background:#4d7d8f; box-shadow:inset 0 -2px 0 rgba(0,0,0,0.2);"></span>{{ playerName }}
      </div>

      <div ref="{{ setTag0 }}" style="position:absolute; left:0; top:0; opacity:0; transform:translateX(-50%); pointer-events:none; display:flex; align-items:center; gap:6px; background:#f7eedd; border:2px solid #4a3526; border-radius:7px; padding:2px 9px; font-family:'Pixelify Sans',sans-serif; font-size:15px; color:#4a3526; white-space:nowrap; box-shadow:0 2px 0 #4a3526;">
        <span style="display:inline-flex; align-items:flex-end; gap:2px; height:11px;">
          <span style="width:2px; height:11px; background:#7fa66a; transform-origin:bottom; animation:bob 0.7s ease-in-out infinite;"></span>
          <span style="width:2px; height:11px; background:#7fa66a; transform-origin:bottom; animation:bob 0.7s ease-in-out infinite 0.18s;"></span>
          <span style="width:2px; height:11px; background:#7fa66a; transform-origin:bottom; animation:bob 0.7s ease-in-out infinite 0.36s;"></span>
        </span>Marlow
      </div>

      <div ref="{{ setTag1 }}" style="position:absolute; left:0; top:0; opacity:0; transform:translateX(-50%); pointer-events:none; display:flex; align-items:center; gap:6px; background:#f7eedd; border:2px solid #4a3526; border-radius:7px; padding:2px 9px; font-family:'Pixelify Sans',sans-serif; font-size:15px; color:#4a3526; white-space:nowrap; box-shadow:0 2px 0 #4a3526;">
        <span style="display:inline-flex; align-items:flex-end; gap:2px; height:11px;">
          <span style="width:2px; height:11px; background:#7fa66a; transform-origin:bottom; animation:bob 0.7s ease-in-out infinite;"></span>
          <span style="width:2px; height:11px; background:#7fa66a; transform-origin:bottom; animation:bob 0.7s ease-in-out infinite 0.22s;"></span>
          <span style="width:2px; height:11px; background:#7fa66a; transform-origin:bottom; animation:bob 0.7s ease-in-out infinite 0.44s;"></span>
        </span>Sage
      </div>

      <div ref="{{ setTag2 }}" style="position:absolute; left:0; top:0; opacity:0; transform:translateX(-50%); pointer-events:none; display:flex; align-items:center; gap:6px; background:#f7eedd; border:2px solid #4a3526; border-radius:7px; padding:2px 9px; font-family:'Pixelify Sans',sans-serif; font-size:15px; color:#4a3526; white-space:nowrap; box-shadow:0 2px 0 #4a3526;">
        <span style="width:9px; height:9px; border-radius:2px; background:#d9a24f; box-shadow:inset 0 -2px 0 rgba(0,0,0,0.2);"></span>Juno
      </div>

      <!-- seat prompt (positioned each frame by the loop) -->
      <div ref="{{ setPrompt }}" style="position:absolute; left:0; top:0; opacity:0; transform:translateX(-50%); pointer-events:none; display:flex; align-items:center; gap:7px; background:rgba(46,32,23,0.84); border-radius:8px; padding:5px 11px; font-family:'Pixelify Sans',sans-serif; font-size:14px; color:#f0e3c8; white-space:nowrap;">
        <span style="display:inline-flex; align-items:center; justify-content:center; min-width:18px; height:18px; border:2px solid #c9b894; border-radius:4px; padding:0 3px; color:#fff8ec;">E</span>
        <span ref="{{ setPromptLabel }}">sit down</span>
      </div>

      <!-- room tab (top-left) -->
      <div style="position:absolute; left:18px; top:18px; display:flex; align-items:center; gap:9px; background:#f7eedd; border:3px solid #4a3526; border-radius:9px; padding:8px 14px; box-shadow:0 4px 0 #4a3526;">
        <span style="width:11px; height:11px; border-radius:50%; background:#7fa66a; box-shadow:0 0 0 3px rgba(127,166,106,0.3);"></span>
        <span style="font-family:'Pixelify Sans',sans-serif; font-size:20px; color:#4a3526; letter-spacing:0.5px;">{{ currentRoomName }}</span>
      </div>

      <!-- minimap (top-right) -->
      <div style="position:absolute; right:18px; top:18px; width:184px; background:#f7eedd; border:3px solid #4a3526; border-radius:10px; box-shadow:0 4px 0 #4a3526; overflow:hidden;">
        <div style="padding:6px 12px; background:#e9d9b6; border-bottom:2px solid #c9b894; font-family:'Pixelify Sans',sans-serif; font-size:13px; letter-spacing:1.5px; color:#6f4527;">MAP</div>
        <div style="padding:8px; display:flex; justify-content:center;">
          <canvas ref="{{ setMiniCanvas }}" style="width:160px; image-rendering:pixelated; border-radius:4px; display:block;"></canvas>
        </div>
      </div>

      <!-- participants panel (right, below map) -->
      <div style="position:absolute; right:18px; top:170px; width:184px; background:#f7eedd; border:3px solid #4a3526; border-radius:10px; box-shadow:0 4px 0 #4a3526; overflow:hidden;">
        <div style="padding:6px 12px; background:#e9d9b6; border-bottom:2px solid #c9b894; font-family:'Pixelify Sans',sans-serif; font-size:13px; letter-spacing:1px; color:#6f4527;">IN THIS SPACE · {{ peopleCount }}</div>
        <div style="display:flex; flex-direction:column; padding:5px;">
          <sc-for list="{{ participants }}" as="p" hint-placeholder-count="4">
            <div style="display:flex; align-items:center; gap:9px; padding:5px 6px; border-radius:6px;">
              <span style="width:15px; height:15px; border-radius:4px; background:{{ p.color }}; box-shadow:inset 0 -3px 0 rgba(0,0,0,0.22); flex:none;"></span>
              <span style="flex:1; font-family:'Nunito',sans-serif; font-weight:700; font-size:13.5px; color:#4a3526;">{{ p.name }}</span>
              <sc-if value="{{ p.speaking }}" hint-placeholder-val="{{ true }}">
                <span style="display:inline-flex; align-items:flex-end; gap:2px; height:12px;">
                  <span style="width:2px; height:12px; background:#7fa66a; transform-origin:bottom; animation:bob 0.7s ease-in-out infinite;"></span>
                  <span style="width:2px; height:12px; background:#7fa66a; transform-origin:bottom; animation:bob 0.7s ease-in-out infinite 0.2s;"></span>
                  <span style="width:2px; height:12px; background:#7fa66a; transform-origin:bottom; animation:bob 0.7s ease-in-out infinite 0.4s;"></span>
                </span>
              </sc-if>
            </div>
          </sc-for>
        </div>
      </div>

      <!-- movement hint (bottom-left) -->
      <div style="position:absolute; left:18px; bottom:84px; display:flex; align-items:center; gap:8px; background:rgba(46,32,23,0.72); border-radius:8px; padding:7px 12px; font-family:'Pixelify Sans',sans-serif; font-size:14px; color:#f0e3c8; letter-spacing:0.5px;">
        <span style="border:2px solid #c9b894; border-radius:4px; padding:0 6px;">WASD</span>
        <span style="opacity:0.85;">walk around · E to sit · get close to talk</span>
      </div>

      <!-- control bar (bottom-center) -->
      <div style="position:absolute; left:50%; bottom:18px; transform:translateX(-50%); display:flex; align-items:center; gap:12px; background:#f7eedd; border:3px solid #4a3526; border-radius:12px; padding:9px 12px; box-shadow:0 5px 0 #4a3526, 0 12px 24px rgba(0,0,0,0.35);">
        <div style="display:flex; align-items:center; gap:8px; padding:0 8px;">
          <span style="width:10px; height:10px; border-radius:50%; background:#7fa66a;"></span>
          <span style="font-family:'Pixelify Sans',sans-serif; font-size:15px; color:#6f4527;">{{ statusText }}</span>
        </div>
        <div style="width:2px; height:30px; background:#d8c7a3;"></div>
        <button type="button" onClick="{{ onToggleMute }}"
                style="display:flex; align-items:center; gap:9px; border:0; cursor:pointer; padding:11px 20px; border-radius:9px; font-family:'Pixelify Sans',sans-serif; font-size:18px; color:#fff8ec; letter-spacing:0.5px; background:{{ micBg }}; box-shadow:0 4px 0 {{ micEdge }};">
          <svg width="16" height="18" viewBox="0 0 16 18" fill="none" style="display:block;">
            <rect x="5" y="1" width="6" height="9" rx="3" fill="#fff8ec"/>
            <path d="M2 8 a6 6 0 0 0 12 0" stroke="#fff8ec" stroke-width="2" fill="none"/>
            <rect x="7" y="14" width="2" height="3" fill="#fff8ec"/>
            <sc-if value="{{ muted }}" hint-placeholder-val="{{ true }}"><line x1="1" y1="2" x2="15" y2="16" stroke="#fff8ec" stroke-width="2"/></sc-if>
          </svg>
          {{ micLabel }}
        </button>
        <button type="button" onClick="{{ onLeave }}"
                style="border:3px solid #b9685e; cursor:pointer; padding:9px 16px; border-radius:9px; font-family:'Pixelify Sans',sans-serif; font-size:16px; color:#b9685e; background:#fbf3e6; letter-spacing:0.5px;">LEAVE</button>
      </div>
    </div>

    <!-- ===================== JOIN OVERLAY ===================== -->
    <div style="position:absolute; inset:0; display:{{ joinDisplay }}; align-items:center; justify-content:center; background:rgba(38,27,19,0.55); backdrop-filter:blur(2px);">
      <div style="width:392px; background:#f7eedd; border:4px solid #4a3526; border-radius:14px; box-shadow:0 8px 0 #4a3526, 0 22px 44px rgba(0,0,0,0.45); padding:30px 34px 28px; text-align:center; animation:floaty 5s ease-in-out infinite;">
        <div style="font-family:'Pixelify Sans',sans-serif; font-weight:700; font-size:46px; line-height:0.95; color:#4a3526; letter-spacing:0.5px;">Proximity</div>
        <div style="width:64px; height:5px; background:#7fa66a; border-radius:3px; margin:10px auto 14px;"></div>
        <div style="font-family:'Nunito',sans-serif; font-weight:600; font-size:15px; color:#8a6a4c; margin-bottom:22px;">A cozy little place to work together.</div>

        <div style="text-align:left; font-family:'Pixelify Sans',sans-serif; font-size:14px; letter-spacing:1px; color:#6f4527; margin-bottom:6px;">YOUR NAME</div>
        <input type="text" maxlength="20" placeholder="traveller" onInput="{{ onNameInput }}"
               style="width:100%; box-sizing:border-box; background:#fffaf0; border:3px solid #6f4527; border-radius:8px; padding:12px 14px; font-family:'Nunito',sans-serif; font-weight:700; font-size:16px; color:#4a3526; outline:none; box-shadow:inset 0 2px 0 rgba(0,0,0,0.06);" />

        <button type="button" onClick="{{ onJoin }}"
                style="width:100%; margin-top:18px; border:0; cursor:pointer; padding:14px; border-radius:10px; font-family:'Pixelify Sans',sans-serif; font-size:23px; color:#fff8ec; letter-spacing:0.5px; background:#7fa66a; box-shadow:0 5px 0 #5f8350;"
                style-active="transform:translateY(2px); box-shadow:0 3px 0 #5f8350;">Enter the Space</button>

        <div style="margin-top:16px; font-family:'Nunito',sans-serif; font-weight:600; font-size:12.5px; color:#a08a6c;">Walk close to people to hear them · move with WASD</div>
      </div>
    </div>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1080,&quot;height&quot;:720},&quot;timeOfDay&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;day&quot;,&quot;evening&quot;],&quot;default&quot;:&quot;day&quot;,&quot;tsType&quot;:&quot;'day' | 'evening'&quot;},&quot;showProximityRing&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;playerShirt&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#4d7d8f&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { screen: 'join', muted: false, name: '', currentRoom: 'Hall' };

  // ---------- geometry ----------
  WW = 336; WH = 220; VW = 160; VH = 100; F = 6.25; MS = 0.46;

  componentDidMount() {
    this.tags = {};
    this.cam = { x: 0, y: 0 };
    this.keys = {};
    this.charBuf = document.createElement('canvas');
    this.charBuf.width = 16; this.charBuf.height = 24;

    this.WALLS = [
      { x: 0, y: 0, w: 336, h: 6 }, { x: 0, y: 214, w: 336, h: 6 },
      { x: 0, y: 0, w: 6, h: 220 }, { x: 330, y: 0, w: 6, h: 220 },
      { x: 110, y: 6, w: 6, h: 92 }, { x: 220, y: 6, w: 6, h: 92 },
      { x: 6, y: 98, w: 38, h: 6 }, { x: 72, y: 98, w: 82, h: 6 },
      { x: 182, y: 98, w: 82, h: 6 }, { x: 292, y: 98, w: 38, h: 6 },
    ];

    this.player = { x: 168, y: 176, facing: 'down', moving: false, walkT: 0, sitting: false };
    this.seats = [
      { x: 58, y: 68 }, { x: 168, y: 68 }, { x: 278, y: 68 },
      { x: 146, y: 180 }, { x: 188, y: 180 },
    ];
    this.peers = [
      { id: 'p0', name: 'Marlow', color: '#7fa66a', cap: '#6f8aa8', x: 130, y: 150, facing: 'down', moving: false, walkT: 0, region: [24, 312, 112, 204], tx: 130, ty: 150, pause: 600 },
      { id: 'p1', name: 'Sage', color: '#cc8d86', cap: '#d9a24f', x: 168, y: 52, facing: 'down', moving: false, walkT: 0, region: [124, 212, 16, 90], tx: 168, ty: 52, pause: 900 },
      { id: 'p2', name: 'Juno', color: '#d9a24f', cap: '#6f8aa8', x: 278, y: 52, facing: 'down', moving: false, walkT: 0, region: [232, 322, 16, 90], tx: 278, ty: 52, pause: 1200 },
    ];

    this._kd = (e) => this.onKey(e, true);
    this._ku = (e) => this.onKey(e, false);
    window.addEventListener('keydown', this._kd);
    window.addEventListener('keyup', this._ku);

    this.last = performance.now();
    this.loop = this.loop.bind(this);
    this.raf = requestAnimationFrame(this.loop);
  }

  componentWillUnmount() {
    cancelAnimationFrame(this.raf);
    window.removeEventListener('keydown', this._kd);
    window.removeEventListener('keyup', this._ku);
  }

  onKey(e, down) {
    const k = e.key.toLowerCase();
    if (k === 'e') { if (down && this.state.screen === 'room') this.toggleSit(); return; }
    const move = ['arrowup', 'arrowdown', 'arrowleft', 'arrowright', 'w', 'a', 's', 'd'];
    if (move.includes(k)) {
      if (this.state.screen === 'room') e.preventDefault();
      this.keys[k] = down;
    }
  }

  toggleSit() {
    const p = this.player;
    if (p.sitting) { this.standUp(); return; }
    let best = null, bd = 18;
    for (const s of this.seats) { const d = Math.hypot(s.x - p.x, s.y - p.y); if (d < bd) { bd = d; best = s; } }
    if (best) { p.x = best.x; p.y = best.y; p.sitting = true; p.facing = 'up'; p.moving = false; p.walkT = 0; }
  }
  standUp() {
    const p = this.player; p.sitting = false; p.facing = 'down';
    const ny = p.y + 12; if (!this.collides(p.x, ny)) p.y = ny;
  }

  // ---------- helpers ----------
  shade(hex, amt) {
    const n = parseInt(hex.slice(1), 16);
    let r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
    if (amt >= 0) { r += (255 - r) * amt; g += (255 - g) * amt; b += (255 - b) * amt; }
    else { r *= (1 + amt); g *= (1 + amt); b *= (1 + amt); }
    const h = (v) => Math.max(0, Math.min(255, Math.round(v))).toString(16).padStart(2, '0');
    return '#' + h(r) + h(g) + h(b);
  }
  ell(ctx, cx, cy, rx, ry, col) { ctx.fillStyle = col; ctx.beginPath(); ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2); ctx.fill(); }
  rrect(ctx, x, y, w, h, r, col) {
    ctx.fillStyle = col; ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath(); ctx.fill();
  }
  drawArt(ctx, art, pal, ox, oy) {
    for (let y = 0; y < art.length; y++) {
      const row = art[y];
      for (let x = 0; x < row.length; x++) {
        const ch = row[x]; if (ch === '.' || ch === ' ') continue;
        const c = pal[ch]; if (!c) continue;
        ctx.fillStyle = c; ctx.fillRect(ox + x, oy + y, 1, 1);
      }
    }
  }

  // ---------- trainer sprite ----------
  getArt() {
    if (this._art) return this._art;
    this._art = {
      down: [
        '......1111......', '....11111111....', '...1111111111...', '...1113331111...',
        '...1111111111...', '..222222222222..', '...4555555554...', '...4557555754...',
        '...4555555554...', '....55555555....', '....88888888....', '...a88888888a...',
        '..a8888888888a..', '..588888888885..', '...8888888888...',
      ],
      up: [
        '......1111......', '....11111111....', '...1111111111...', '...1111111111...',
        '...1113331111...', '...1111111111...', '...4444444444...', '...4444444444...',
        '...4444444444...', '....44444444....', '....88888888....', '...a88kkkk88a...',
        '..a88KKKKKK88a..', '..588KKKKKK885..', '...8888888888...',
      ],
      side: [
        '......11111.....', '.....1111111....', '....111111111...', '....133111111...',
        '....111111111...', '..22221111111...', '....55555544....', '...5755555544...',
        '...5555555544...', '....55555544....', '....88888888....', '...88888888a....',
        '..5888888888....', '...88888888a....', '...88888888.....',
      ],
      legsStand: [
        '...bbbbbbbbbb...', '...bbbb..bbbb...', '...cbbb..bbbc...', '...cbbb..bbbc...',
        '...cbbb..bbbc...', '...dddd..dddd...', '...eeee..eeee...',
      ],
      legsA: [
        '...bbbbbbbbbb...', '...bbbb..bbbb...', '...cbbb..bbbc...', '...dddd..bbbc...',
        '...eeee..bbbc...', '.........dddd...', '.........eeee...',
      ],
      legsB: [
        '...bbbbbbbbbb...', '...bbbb..bbbb...', '...cbbb..bbbc...', '...cbbb..dddd...',
        '...cbbb..eeee...', '...dddd.........', '...eeee.........',
      ],
      legsSit: [
        '...bbbbbbbbbb...', '...bbbbbbbbbb...', '...cbbbbbbbbc...', '....cbbbbbbc....',
        '................', '................', '................',
      ],
    };
    return this._art;
  }
  trainerPal(shirt, cap) {
    return {
      '1': cap, '2': this.shade(cap, -0.22), '3': this.shade(cap, 0.3),
      '4': '#4a3526', '5': '#f1c49c', '6': '#d39e76', '7': '#33271f',
      '8': shirt, '9': this.shade(shirt, -0.2), 'a': this.shade(shirt, 0.22),
      'b': '#41506b', 'c': '#33405a', 'd': '#5a3d2b', 'e': '#432c1f',
      'k': '#5c3a23', 'K': '#7a4e2d',
    };
  }
  renderTrainer(facing, frame, shirt, cap, sitting) {
    const ctx = this.charBuf.getContext('2d');
    ctx.clearRect(0, 0, 16, 24);
    const A = this.getArt();
    const body = sitting ? A.up : facing === 'up' ? A.up : (facing === 'left' || facing === 'right') ? A.side : A.down;
    const legs = sitting ? A.legsSit : frame === 1 ? A.legsA : frame === 2 ? A.legsB : A.legsStand;
    const pal = this.trainerPal(shirt, cap);
    this.drawArt(ctx, body, pal, 0, 0);
    this.drawArt(ctx, legs, pal, 0, 15);
  }

  // ---------- static world ----------
  fillPlanks(ctx, X, Y, W, H, base) {
    ctx.fillStyle = base; ctx.fillRect(X, Y, W, H);
    const seam = this.shade(base, -0.28), hi = this.shade(base, 0.16);
    let b = 0;
    for (let yy = Y; yy < Y + H; yy += 12) {
      const hh = Math.min(12, Y + H - yy);
      if (b % 2 === 0) { ctx.globalAlpha = 0.16; ctx.fillStyle = hi; ctx.fillRect(X, yy, W, hh); ctx.globalAlpha = 1; }
      ctx.fillStyle = seam; ctx.fillRect(X, yy, W, 1);
      const st = (b % 2) ? X + 52 : X;
      for (let xx = st; xx < X + W; xx += 104) ctx.fillRect(xx, yy, 1, hh);
      b++;
    }
  }
  drawWall(ctx, r) {
    ctx.fillStyle = '#8a5a36'; ctx.fillRect(r.x, r.y, r.w, r.h);
    ctx.fillStyle = '#b5895a'; ctx.fillRect(r.x, r.y, r.w, 1); ctx.fillRect(r.x, r.y, 1, r.h);
    ctx.fillStyle = '#5c3a23'; ctx.fillRect(r.x, r.y + r.h - 2, r.w, 2); ctx.fillRect(r.x + r.w - 2, r.y, 2, r.h);
    // plank seams on wide walls
    ctx.fillStyle = '#6f4527'; ctx.globalAlpha = 0.5;
    if (r.w > r.h) { for (let x = r.x + 16; x < r.x + r.w; x += 16) ctx.fillRect(x, r.y + 1, 1, r.h - 3); }
    else { for (let y = r.y + 16; y < r.y + r.h; y += 16) ctx.fillRect(r.x + 1, y, r.w - 3, 1); }
    ctx.globalAlpha = 1;
  }
  px(ctx, x, y, w, h, col) { ctx.fillStyle = col; ctx.fillRect(x, y, w, h); }

  drawPlant(ctx, x, y) {
    const L = '#6e9c5a', LD = '#588046', LH = '#8cbf72';
    this.ell(ctx, x + 8, y + 22, 11, 4, 'rgba(58,38,22,0.16)');
    this.px(ctx, x + 2, y - 6, 14, 12, LD); this.px(ctx, x + 3, y - 8, 12, 10, L);
    this.px(ctx, x + 1, y - 2, 5, 8, L); this.px(ctx, x + 12, y - 2, 5, 8, L);
    this.px(ctx, x + 5, y - 11, 7, 6, LH); this.px(ctx, x + 4, y - 4, 3, 3, LH); this.px(ctx, x + 11, y - 5, 3, 3, LH);
    this.px(ctx, x + 8, y - 13, 2, 3, L); this.px(ctx, x + 2, y - 7, 2, 3, L); this.px(ctx, x + 14, y - 6, 2, 3, L);
    this.px(ctx, x + 2, y + 6, 14, 4, '#a85b39'); this.px(ctx, x + 3, y + 9, 12, 9, '#c2714b');
    this.px(ctx, x + 3, y + 9, 12, 1, '#d4895f'); this.px(ctx, x + 4, y + 10, 2, 7, '#d4895f');
  }
  chairBack(ctx, cx, ty, cushion) {
    this.ell(ctx, cx, ty + 17, 12, 4, 'rgba(58,38,22,0.14)');
    this.px(ctx, cx - 9, ty + 8, 3, 9, '#6f4527'); this.px(ctx, cx + 6, ty + 8, 3, 9, '#6f4527');
    this.px(ctx, cx - 9, ty + 5, 18, 4, '#8a5a36');
    this.px(ctx, cx - 10, ty - 3, 3, 12, '#6f4527'); this.px(ctx, cx + 7, ty - 3, 3, 12, '#6f4527');
    this.px(ctx, cx - 10, ty - 5, 20, 3, '#8a5a36');
    this.px(ctx, cx - 7, ty - 2, 14, 9, this.shade(cushion, -0.18)); this.px(ctx, cx - 6, ty - 1, 12, 7, cushion);
    this.px(ctx, cx - 5, ty, 10, 2, this.shade(cushion, 0.22));
  }
  drawWorkstation(ctx, cx, cy, accent) {
    this.rrect(ctx, cx - 32, cy - 24, 64, 50, 8, this.shade(accent, -0.12));
    this.rrect(ctx, cx - 31, cy - 23, 62, 48, 7, accent);
    this.rrect(ctx, cx - 26, cy - 19, 52, 40, 6, this.shade(accent, 0.16));
    this.ell(ctx, cx, cy + 2, 28, 8, 'rgba(58,38,22,0.16)');
    this.px(ctx, cx - 19, cy - 2, 4, 12, '#6f4527'); this.px(ctx, cx + 15, cy - 2, 4, 12, '#6f4527');
    this.px(ctx, cx - 22, cy - 12, 44, 8, '#a9743a'); this.px(ctx, cx - 22, cy - 14, 44, 3, '#c89b5e'); this.px(ctx, cx - 22, cy - 14, 44, 1, '#dab277');
    ctx.globalAlpha = 0.14; for (let gx = cx - 18; gx < cx + 18; gx += 8) this.px(ctx, gx, cy - 11, 1, 6, '#000'); ctx.globalAlpha = 1;
    // laptop
    this.px(ctx, cx - 10, cy - 26, 20, 11, '#2f3a42'); this.px(ctx, cx - 8, cy - 24, 16, 8, '#bfe6e6');
    ctx.globalAlpha = 0.5; this.px(ctx, cx - 8, cy - 24, 16, 4, '#88c6c9'); ctx.globalAlpha = 1;
    for (let i = 0; i < 3; i++) this.px(ctx, cx - 6, cy - 23 + i * 2, 6 + i * 3, 1, i % 2 ? '#88c6c9' : '#e9f6ee');
    this.px(ctx, cx - 11, cy - 15, 22, 2, '#44525d'); this.px(ctx, cx - 11, cy - 13, 22, 3, '#5b6b78'); this.px(ctx, cx - 11, cy - 13, 22, 1, '#6f8290');
    // mug
    this.px(ctx, cx + 13, cy - 18, 5, 5, '#e7eef0'); this.px(ctx, cx + 13, cy - 18, 5, 1, '#c4d2d6');
    // chair
    this.chairBack(ctx, cx, cy + 6, '#cc8d86');
  }
  drawWindow(ctx, x, y, w, h) {
    this.px(ctx, x - 1, y - 1, w + 2, h + 2, '#8a5a36'); this.px(ctx, x - 1, y - 1, w + 2, 1, '#9c6a40');
    this.px(ctx, x, y, w, h, '#bfe0e8'); this.px(ctx, x, y + h / 2, w, h / 2, '#9fcad6');
    this.px(ctx, x + w / 2 - 1, y, 2, h, '#8a5a36'); this.px(ctx, x, y + h / 2 - 1, w, 2, '#8a5a36');
  }
  drawBookshelf(ctx, x, y, w, h) {
    this.px(ctx, x, y, w, h, '#6f4527'); this.px(ctx, x + 2, y + 2, w - 4, h - 4, '#8a5a36');
    const cols = ['#cc8d86', '#7fa66a', '#d9a24f', '#6f8aa8', '#b86f9c'];
    for (let s = 0; s < 2; s++) {
      const sy = y + 4 + s * 11; this.px(ctx, x + 2, sy + 9, w - 4, 2, '#6f4527');
      let bx = x + 4, ci = s;
      while (bx < x + w - 5) { const bw = 3 + ((ci * 7) % 3); this.px(ctx, bx, sy + 1, bw, 8, cols[ci % cols.length]); this.px(ctx, bx, sy + 1, bw, 1, '#fff'); bx += bw + 1; ci++; }
    }
  }
  // vertical bookshelf against a left wall, opening (books) facing right
  drawBookshelfV(ctx, x, y, w, h) {
    this.px(ctx, x, y, w, h, '#6f4527');
    this.px(ctx, x + 3, y + 1, w - 4, h - 2, '#7a4e2d');
    this.px(ctx, x, y, 3, h, '#5c3a23');            // solid back against the wall
    this.px(ctx, x + w - 2, y, 2, h, '#9c6a40');    // bright front edge (faces right)
    const cols = ['#cc8d86', '#7fa66a', '#d9a24f', '#6f8aa8', '#b86f9c', '#5b6b78'];
    const rows = Math.max(2, Math.floor((h - 4) / 13));
    let ci = 0;
    for (let s = 0; s < rows; s++) {
      const sy = y + 3 + s * 13;
      this.px(ctx, x + 3, sy - 1, w - 3, 11, '#5c3a23');   // shelf interior shadow
      let bx = x + 5;
      while (bx < x + w - 3) {
        const bw = 2 + (ci % 2), bh = 7 + ((ci * 2) % 3);
        this.px(ctx, bx, sy + (9 - bh), bw, bh, cols[ci % cols.length]);
        this.px(ctx, bx, sy + (9 - bh), bw, 1, '#ffffff');
        bx += bw + 1; ci++;
      }
      this.px(ctx, x + 3, sy + 10, w - 3, 2, '#4a3526'); // shelf board
    }
  }
  drawHall(ctx, cx, cy) {
    this.rrect(ctx, cx - 58, cy - 30, 116, 64, 10, '#6e9459');
    this.rrect(ctx, cx - 56, cy - 28, 112, 60, 9, '#7fa66a');
    this.rrect(ctx, cx - 48, cy - 22, 96, 48, 7, '#93b97f');
    this.ell(ctx, cx, cy + 4, 52, 11, 'rgba(58,38,22,0.16)');
    this.px(ctx, cx - 46, cy - 4, 8, 12, '#6f4527'); this.px(ctx, cx + 38, cy - 4, 8, 12, '#6f4527');
    this.px(ctx, cx - 50, cy - 14, 100, 10, '#a9743a'); this.px(ctx, cx - 50, cy - 16, 100, 3, '#c89b5e'); this.px(ctx, cx - 50, cy - 16, 100, 1, '#dab277');
    this.px(ctx, cx - 30, cy - 26, 18, 10, '#2f3a42'); this.px(ctx, cx - 28, cy - 24, 14, 6, '#bfe6e6');
    this.px(ctx, cx + 14, cy - 26, 18, 10, '#2f3a42'); this.px(ctx, cx + 16, cy - 24, 14, 6, '#bfe6e6');
    this.px(ctx, cx - 4, cy - 21, 5, 5, '#e7eef0');
    // north chairs (seen from front, behind table)
    this.px(ctx, cx - 30, cy - 30, 16, 7, '#9c6a40'); this.px(ctx, cx - 30, cy - 30, 16, 2, '#b5895a');
    this.px(ctx, cx + 12, cy - 30, 16, 7, '#9c6a40'); this.px(ctx, cx + 12, cy - 30, 16, 2, '#b5895a');
    // south chairs (backs)
    this.chairBack(ctx, cx - 22, cy + 10, '#6f8aa8'); this.chairBack(ctx, cx + 20, cy + 10, '#cc8d86');
  }

  buildWorld() {
    const c = document.createElement('canvas'); c.width = this.WW; c.height = this.WH;
    const x = c.getContext('2d'); x.imageSmoothingEnabled = false;
    x.fillStyle = '#3a2a1c'; x.fillRect(0, 0, this.WW, this.WH);
    this.fillPlanks(x, 6, 6, 104, 92, '#c2904f');
    this.fillPlanks(x, 116, 6, 104, 92, '#c2904f');
    this.fillPlanks(x, 226, 6, 104, 92, '#c2904f');
    this.fillPlanks(x, 6, 104, 324, 110, '#bd8a4a');
    this.drawWorkstation(x, 58, 50, '#7fa66a');
    this.drawWorkstation(x, 168, 50, '#6f8aa8');
    this.drawWorkstation(x, 278, 50, '#cc8d86');
    this.drawPlant(x, 90, 70); this.drawPlant(x, 196, 70); this.drawPlant(x, 306, 70);
    this.drawHall(x, 168, 158);
    this.drawPlant(x, 14, 188); this.drawPlant(x, 306, 188);
    this.drawBookshelfV(x, 6, 116, 18, 54);
    // walls last
    for (const r of this.WALLS) this.drawWall(x, r);
    // doorway thresholds (lighter mats in the gaps)
    [58, 168, 278].forEach((dx) => { x.fillStyle = '#d2a96a'; x.fillRect(dx - 12, 99, 24, 4); x.fillStyle = '#e0bd86'; x.fillRect(dx - 12, 99, 24, 1); });
    // windows over the top wall, per room
    [58, 168, 278].forEach((wx) => this.drawWindow(x, wx - 18, 1, 36, 5));
    this.worldCanvas = c;
  }

  buildMini() {
    const ms = this.MS, mw = Math.round(this.WW * ms), mh = Math.round(this.WH * ms);
    const c = document.createElement('canvas'); c.width = mw; c.height = mh;
    const x = c.getContext('2d'); x.imageSmoothingEnabled = false;
    x.fillStyle = '#3a2a1c'; x.fillRect(0, 0, mw, mh);
    const R = (X, Y, W, H, col) => { x.fillStyle = col; x.fillRect(Math.round(X * ms), Math.round(Y * ms), Math.round(W * ms), Math.round(H * ms)); };
    R(6, 6, 104, 92, '#caa066'); R(116, 6, 104, 92, '#caa066'); R(226, 6, 104, 92, '#caa066');
    R(6, 104, 324, 110, '#c0975a');
    R(40, 32, 36, 28, '#9bbf86'); R(150, 32, 36, 28, '#9fb6cf'); R(260, 32, 36, 28, '#dba8a2');
    R(118, 130, 100, 52, '#9bbf86');
    for (const w of this.WALLS) R(w.x, w.y, w.w, w.h, '#5c3a23');
    this.miniBase = c; this.miniW = mw; this.miniH = mh;
  }

  // ---------- update ----------
  collides(x, y) {
    const hw = 5, hh = 4;
    for (const w of this.WALLS) {
      if (x - hw < w.x + w.w && x + hw > w.x && y - hh < w.y + w.h && y + hh > w.y) return true;
    }
    return false;
  }
  roomName(x, y) {
    if (y < 98) return x < 110 ? 'Room A' : x < 220 ? 'Room B' : 'Room C';
    return 'Hall';
  }
  faceFrom(vx, vy) {
    if (Math.abs(vy) > Math.abs(vx)) return vy < 0 ? 'up' : 'down';
    return vx < 0 ? 'left' : 'right';
  }
  updatePlayer(dt) {
    const k = this.keys;
    if (this.player.sitting) {
      const anyMove = k['w'] || k['a'] || k['s'] || k['d'] || k['arrowup'] || k['arrowdown'] || k['arrowleft'] || k['arrowright'];
      if (anyMove) this.standUp(); else return;
    }
    let vx = 0, vy = 0;
    if (k['w'] || k['arrowup']) vy -= 1;
    if (k['s'] || k['arrowdown']) vy += 1;
    if (k['a'] || k['arrowleft']) vx -= 1;
    if (k['d'] || k['arrowright']) vx += 1;
    const p = this.player;
    p.moving = !!(vx || vy);
    if (p.moving) {
      const len = Math.hypot(vx, vy); vx /= len; vy /= len;
      const sp = 0.066 * dt;
      const nx = p.x + vx * sp;
      if (!this.collides(nx, p.y)) p.x = nx;
      const ny = p.y + vy * sp;
      if (!this.collides(p.x, ny)) p.y = ny;
      p.facing = this.faceFrom(vx, vy);
      p.walkT += dt;
      p.x = Math.max(8, Math.min(this.WW - 8, p.x));
      p.y = Math.max(8, Math.min(this.WH - 6, p.y));
    } else { p.walkT = 0; }
    const rm = this.roomName(p.x, p.y);
    if (rm !== this.state.currentRoom) this.setState({ currentRoom: rm });
  }
  updatePeer(pe, dt) {
    const dx = pe.tx - pe.x, dy = pe.ty - pe.y, d = Math.hypot(dx, dy);
    if (d < 2) {
      pe.moving = false; pe.walkT = 0; pe.pause -= dt;
      if (pe.pause <= 0) {
        const [x0, x1, y0, y1] = pe.region;
        pe.tx = x0 + Math.random() * (x1 - x0); pe.ty = y0 + Math.random() * (y1 - y0);
        pe.pause = 700 + Math.random() * 1800;
      }
    } else {
      const sp = Math.min(d, 0.032 * dt); pe.x += (dx / d) * sp; pe.y += (dy / d) * sp;
      pe.moving = true; pe.walkT += dt; pe.facing = this.faceFrom(dx, dy);
    }
  }

  // ---------- render ----------
  loop(t) {
    const dt = Math.min(50, t - this.last); this.last = t;
    if (!this.worldCanvas) this.buildWorld();
    if (!this.miniBase) this.buildMini();
    if (this.state.screen === 'room') this.updatePlayer(dt);
    for (const pe of this.peers) this.updatePeer(pe, dt);
    this.render();
    this.raf = requestAnimationFrame(this.loop);
  }
  drawEntity(ctx, e, shirt, cap) {
    const sx = Math.round(e.x - this.cam.x), sy = Math.round(e.y - this.cam.y);
    if (sx < -16 || sx > this.VW + 16 || sy < -28 || sy > this.VH + 16) return;
    this.ell(ctx, sx, sy, 8, 3, 'rgba(58,38,22,0.22)');
    const sitting = !!e.sitting;
    const frame = (!sitting && e.moving) ? [1, 0, 2, 0][Math.floor(e.walkT / 120) % 4] : 0;
    const bob = (!sitting && e.moving && frame !== 0) ? -1 : 0;
    this.renderTrainer(e.facing, frame, shirt, cap, sitting);
    const tlx = sx - 8, tly = sy - 22 + bob;
    if (e.facing === 'right') { ctx.save(); ctx.translate(tlx + 16, tly); ctx.scale(-1, 1); ctx.drawImage(this.charBuf, 0, 0); ctx.restore(); }
    else ctx.drawImage(this.charBuf, tlx, tly);
  }
  render() {
    const cv = this.sceneEl; if (!cv || !this.worldCanvas) return;
    const ctx = cv.getContext('2d'); ctx.imageSmoothingEnabled = false;
    const p = this.player;
    this.cam.x = Math.round(Math.max(0, Math.min(this.WW - this.VW, p.x - this.VW / 2)));
    this.cam.y = Math.round(Math.max(0, Math.min(this.WH - this.VH, p.y - this.VH / 2)));

    ctx.drawImage(this.worldCanvas, this.cam.x, this.cam.y, this.VW, this.VH, 0, 0, this.VW, this.VH);

    // proximity ring under player
    if (this.props.showProximityRing ?? true) {
      const psx = p.x - this.cam.x, psy = p.y - this.cam.y;
      ctx.save(); ctx.lineWidth = 1;
      [[30, 12], [22, 9], [14, 6]].forEach(([rx, ry], i) => {
        ctx.strokeStyle = 'rgba(127,166,106,' + (0.4 - i * 0.07) + ')';
        ctx.beginPath(); ctx.ellipse(psx, psy, rx, ry, 0, 0, Math.PI * 2); ctx.stroke();
      });
      ctx.fillStyle = 'rgba(127,166,106,0.08)'; ctx.beginPath(); ctx.ellipse(psx, psy, 30, 12, 0, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }

    // entities sorted by y
    const shirt = this.props.playerShirt ?? '#4d7d8f';
    const ents = [
      { e: p, shirt, cap: '#d9614f', self: true },
      ...this.peers.map((pe) => ({ e: pe, shirt: pe.color, cap: pe.cap, self: false })),
    ].sort((a, b) => a.e.y - b.e.y);
    for (const o of ents) this.drawEntity(ctx, o.e, o.shirt, o.cap);

    // lighting
    const evening = (this.props.timeOfDay ?? 'day') === 'evening';
    if (evening) {
      ctx.fillStyle = 'rgba(46,30,66,0.28)'; ctx.fillRect(0, 0, this.VW, this.VH);
      const g = ctx.createRadialGradient(p.x - this.cam.x, p.y - this.cam.y, 4, p.x - this.cam.x, p.y - this.cam.y, 60);
      g.addColorStop(0, 'rgba(247,214,150,0.22)'); g.addColorStop(1, 'rgba(247,214,150,0)');
      ctx.fillStyle = g; ctx.fillRect(0, 0, this.VW, this.VH);
    }

    this.updateOverlays();
  }
  updateOverlays() {
    const F = this.F, p = this.player;
    const place = (el, e, audible) => {
      if (!el) return;
      const sx = Math.round(e.x - this.cam.x), sy = Math.round(e.y - this.cam.y);
      if (sx < -10 || sx > this.VW + 10 || sy < -20 || sy > this.VH + 10) { el.style.opacity = '0'; return; }
      el.style.left = Math.round(sx * F) + 'px';
      el.style.top = Math.round((sy - 28) * F) + 'px';
      el.style.opacity = audible ? '1' : '0.4';
    };
    place(this.tags.self, p, true);
    this.peers.forEach((pe, i) => {
      const audible = Math.hypot(pe.x - p.x, pe.y - p.y) < 70;
      place(this.tags['p' + i], pe, audible);
    });

    // seat prompt
    if (this.promptEl) {
      let txt = '';
      if (p.sitting) txt = 'stand up';
      else { for (const s of this.seats) { if (Math.hypot(s.x - p.x, s.y - p.y) < 18) { txt = 'sit down'; break; } } }
      if (txt) {
        const sx = Math.round(p.x - this.cam.x), sy = Math.round(p.y - this.cam.y);
        this.promptEl.style.left = Math.round(sx * F) + 'px';
        this.promptEl.style.top = Math.round((sy + 12) * F) + 'px';
        this.promptEl.style.opacity = '1';
        if (this.promptLabelEl) this.promptLabelEl.textContent = txt;
      } else { this.promptEl.style.opacity = '0'; }
    }

    // minimap
    const mini = this.miniEl;
    if (mini && this.miniBase) {
      if (mini.width !== this.miniW) { mini.width = this.miniW; mini.height = this.miniH; }
      const m = mini.getContext('2d'); m.imageSmoothingEnabled = false;
      m.drawImage(this.miniBase, 0, 0);
      const ms = this.MS;
      const dot = (e, col) => { m.fillStyle = col; m.fillRect(Math.round(e.x * ms) - 1, Math.round(e.y * ms) - 1, 3, 3); };
      this.peers.forEach((pe) => dot(pe, pe.color));
      m.fillStyle = this.props.playerShirt ?? '#4d7d8f';
      m.fillRect(Math.round(p.x * ms) - 1, Math.round(p.y * ms) - 1, 3, 3);
      m.fillStyle = '#fffaf0'; m.fillRect(Math.round(p.x * ms) - 2, Math.round(p.y * ms) - 2, 5, 1);
      m.strokeStyle = 'rgba(255,250,235,0.85)'; m.lineWidth = 1;
      m.strokeRect(Math.round(this.cam.x * ms) + 0.5, Math.round(this.cam.y * ms) + 0.5, Math.round(this.VW * ms), Math.round(this.VH * ms));
    }
  }

  renderVals() {
    const muted = this.state.muted;
    const name = this.state.name.trim();
    return {
      setSceneCanvas: (el) => { this.sceneEl = el; },
      setMiniCanvas: (el) => { this.miniEl = el; },
      setTagSelf: (el) => { this.tags && (this.tags.self = el); },
      setTag0: (el) => { this.tags && (this.tags.p0 = el); },
      setTag1: (el) => { this.tags && (this.tags.p1 = el); },
      setTag2: (el) => { this.tags && (this.tags.p2 = el); },
      setPrompt: (el) => { this.promptEl = el; },
      setPromptLabel: (el) => { this.promptLabelEl = el; },
      joinDisplay: this.state.screen === 'join' ? 'flex' : 'none',
      roomDisplay: this.state.screen === 'room' ? 'block' : 'none',
      onJoin: () => this.setState({ screen: 'room' }),
      onLeave: () => this.setState({ screen: 'join' }),
      onNameInput: (e) => this.setState({ name: e.target.value }),
      onToggleMute: () => this.setState({ muted: !this.state.muted }),
      muted,
      micLabel: muted ? 'MUTED' : 'MIC ON',
      micBg: muted ? '#b9685e' : '#7fa66a',
      micEdge: muted ? '#8f4a42' : '#5f8350',
      playerName: name || 'You',
      currentRoomName: this.state.currentRoom,
      statusText: 'Connected',
      peopleCount: '4',
      participants: [
        { name: (name || 'You') + ' (you)', color: this.props.playerShirt ?? '#4d7d8f', speaking: !muted },
        { name: 'Marlow', color: '#7fa66a', speaking: true },
        { name: 'Sage', color: '#cc8d86', speaking: true },
        { name: 'Juno', color: '#d9a24f', speaking: false },
      ],
    };
  }
}
</script>
</body>
